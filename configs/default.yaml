# Default hyperparameters for debias-hiring experiments
# Override any value via CLI args in experiments/run_sweep.py

data:
  max_len: 256
  min_freq: 2
  batch_size: 32

model:
  embed_dim: 100
  hidden_dim: 128
  adv_hidden: 64
  dropout: 0.3

training:
  epochs: 15
  warmup_epochs: 5
  lr: 1.0e-3
  grad_clip: 5.0
  seed: 42

sweep:
  lambda_values: [0.0, 0.25, 0.5, 0.75, 1.0]

paths:
  glove: "glove.6B.100d.txt"
  results: "results/figures"

wandb:
  project: "debias-hiring"
